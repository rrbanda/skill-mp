name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions you have considered?
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - UI (Next.js)
        - Builder Agent (Python)
        - Knowledge Graph
        - Registry / Skills
        - SDK / API
        - Documentation
        - Other
    validations:
      required: true
