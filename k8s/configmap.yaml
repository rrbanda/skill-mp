apiVersion: v1
kind: ConfigMap
metadata:
  name: shared-config
  namespace: skills-marketplace
  labels:
    app.kubernetes.io/part-of: skills-marketplace
data:
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USER: "neo4j"
  NEO4J_PASSWORD: "skillsmarketplace"
  NEO4J_DATABASE: "neo4j"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: builder-agent-config
  namespace: skills-marketplace
  labels:
    app.kubernetes.io/part-of: skills-marketplace
data:
  LLM_MODEL: "openai/gemini/models/gemini-2.5-flash"
  LLM_API_BASE: "https://llamastack-llamastack.apps.ocp.v7hjl.sandbox2288.opentlc.com/v1"
  LLM_API_KEY: "not-needed"
  EMBEDDING_MODEL: "all-MiniLM-L6-v2"
  REGISTRY_DIR: "/app/registry"
  HOST: "0.0.0.0"
  PORT: "8001"
  CORS_ORIGINS: "https://skills-marketplace-skills-marketplace.apps.ocp.v7hjl.sandbox2288.opentlc.com,http://localhost:3000"
  PIPELINE_TIMEOUT_SECONDS: "120"
  UV_CACHE_DIR: "/tmp/uv-cache"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ui-config
  namespace: skills-marketplace
  labels:
    app.kubernetes.io/part-of: skills-marketplace
data:
  GRAPH_BACKEND: "neo4j"
  BUILDER_AGENT_URL: "http://builder-agent:8001"
  NEXT_PUBLIC_SITE_NAME: "Skills Marketplace"
  NEXT_PUBLIC_GITHUB_URL: "https://github.com/rrbanda/skill-mp"
  HOSTNAME: "0.0.0.0"
  PORT: "3000"
