# Secrets are in secrets.yaml (not committed)
apiVersion: v1
kind: ConfigMap
metadata:
  name: shared-config
  namespace: skills-marketplace
  labels:
    app.kubernetes.io/part-of: skills-marketplace
data:
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USER: "neo4j"
  NEO4J_DATABASE: "neo4j"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: builder-agent-config
  namespace: skills-marketplace
  labels:
    app.kubernetes.io/part-of: skills-marketplace
data:
  LLM_MODEL: "openai/gemini/models/gemini-2.5-flash"
  LLM_API_BASE: "http://REPLACE_WITH_LLM_SERVICE:8080/v1"
  EMBEDDING_MODEL: "all-MiniLM-L6-v2"
  REGISTRY_DIR: "/app/registry"
  HOST: "0.0.0.0"
  PORT: "8001"
  CORS_ORIGINS: "http://localhost:3000"  # Add your production URL
  PIPELINE_TIMEOUT_SECONDS: "120"
  UV_CACHE_DIR: "/tmp/uv-cache"
  HF_HOME: "/tmp/hf-cache"
  TRANSFORMERS_CACHE: "/tmp/hf-cache"
  SENTENCE_TRANSFORMERS_HOME: "/tmp/hf-cache"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ui-config
  namespace: skills-marketplace
  labels:
    app.kubernetes.io/part-of: skills-marketplace
data:
  GRAPH_BACKEND: "neo4j"
  BUILDER_AGENT_URL: "http://builder-agent:8001"
  NEXT_PUBLIC_SITE_NAME: "Skills Marketplace"
  NEXT_PUBLIC_GITHUB_URL: "https://github.com/rrbanda/skill-mp"
  REGISTRY_DIR: "/app/registry"
  HOSTNAME: "0.0.0.0"
  PORT: "3000"
