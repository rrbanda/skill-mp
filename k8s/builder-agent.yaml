apiVersion: v1
kind: Service
metadata:
  name: builder-agent
  namespace: skills-marketplace
  labels:
    app: builder-agent
    app.kubernetes.io/part-of: skills-marketplace
spec:
  selector:
    app: builder-agent
  ports:
    - name: http
      port: 8001
      targetPort: 8001
    - name: a2a
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: builder-agent
  namespace: skills-marketplace
  labels:
    app: builder-agent
    app.kubernetes.io/part-of: skills-marketplace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: builder-agent
  template:
    metadata:
      labels:
        app: builder-agent
    spec:
      volumes:
        - name: registry
          persistentVolumeClaim:
            claimName: registry-data
        - name: docsclaw-config
          configMap:
            name: docsclaw-config
        - name: docsclaw-skills
          emptyDir: {}
        - name: agent-workspace
          emptyDir: {}
      initContainers:
        - name: flatten-skills
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              for plugin_dir in /registry/*/; do
                plugin=$(basename "$plugin_dir")
                for skill_dir in "$plugin_dir"*/; do
                  if [ -f "$skill_dir/SKILL.md" ]; then
                    skill=$(basename "$skill_dir")
                    dest="/skills/${plugin}-${skill}"
                    mkdir -p "$dest"
                    cp "$skill_dir/SKILL.md" "$dest/"
                    [ -f "$skill_dir/skill.yaml" ] && cp "$skill_dir/skill.yaml" "$dest/"
                  fi
                done
              done
          volumeMounts:
            - name: registry
              mountPath: /registry
              readOnly: true
            - name: docsclaw-skills
              mountPath: /skills
      containers:
        - name: builder-agent
          image: ghcr.io/rrbanda/skill-mp/agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          volumeMounts:
            - name: registry
              mountPath: /app/registry
          envFrom:
            - configMapRef:
                name: shared-config
            - configMapRef:
                name: builder-agent-config
            - secretRef:
                name: neo4j-credentials
            - secretRef:
                name: builder-agent-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "4"
        - name: docsclaw
          image: ghcr.io/redhat-et/docsclaw:latest
          imagePullPolicy: Always
          args:
            - serve
            - --config-dir
            - /config/agent
            - --listen-plain-http
          ports:
            - containerPort: 8000
              name: a2a
            - containerPort: 8100
              name: health
          volumeMounts:
            - name: docsclaw-config
              mountPath: /config/agent/system-prompt.txt
              subPath: system-prompt.txt
            - name: docsclaw-config
              mountPath: /config/agent/agent-card.json
              subPath: agent-card.json
            - name: docsclaw-config
              mountPath: /config/agent/agent-config.yaml
              subPath: agent-config.yaml
            - name: docsclaw-skills
              mountPath: /config/agent/skills
              readOnly: true
            - name: agent-workspace
              mountPath: /tmp/agent-workspace
          env:
            - name: LLM_PROVIDER
              value: openai
            - name: LLM_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: builder-agent-config
                  key: LLM_API_BASE
            - name: LLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: builder-agent-config
                  key: LLM_MODEL
                  optional: true
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: builder-agent-secrets
                  key: LLM_API_KEY
                  optional: true
          readinessProbe:
            httpGet:
              path: /ready
              port: 8100
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "500m"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: skills-marketplace
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
