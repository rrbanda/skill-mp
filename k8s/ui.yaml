apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: skills-marketplace
  labels:
    app: ui
    app.kubernetes.io/part-of: skills-marketplace
spec:
  selector:
    app: ui
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: skills-marketplace
  labels:
    app: ui
    app.kubernetes.io/part-of: skills-marketplace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          # Override via: kubectl set image deployment/ui ui=YOUR_IMAGE
          image: ghcr.io/rrbanda/skill-mp/ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: shared-config
            - configMapRef:
                name: ui-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ui
  namespace: skills-marketplace
  labels:
    app: ui
    app.kubernetes.io/part-of: skills-marketplace
spec:
  # host: auto-generated by OpenShift; set explicitly for custom domains
  to:
    kind: Service
    name: ui
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
