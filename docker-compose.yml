services:
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/skillsmarketplace
      NEO4J_PLUGINS: '[]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  neo4j-test:
    profiles: ["test"]
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/testpassword
    ports:
      - "7688:7687"
    tmpfs:
      - /data

volumes:
  neo4j-data:
