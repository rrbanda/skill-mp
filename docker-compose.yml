services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/skillsmarketplace
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "skillsmarketplace", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  builder-agent:
    build: ./builder-agent
    ports:
      - "8001:8001"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: skillsmarketplace
      LLM_MODEL: ${LLM_MODEL:-openai/gemini/models/gemini-2.5-flash}
      LLM_API_BASE: ${LLM_API_BASE:-http://host.docker.internal:11434/v1}
      LLM_API_KEY: ${LLM_API_KEY:-not-needed}
      REGISTRY_DIR: /registry
      CORS_ORIGINS: http://localhost:3000
    volumes:
      - ./registry:/registry
    depends_on:
      neo4j:
        condition: service_healthy

  ui:
    build: ./ui
    ports:
      - "3000:3000"
    environment:
      GRAPH_BACKEND: neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: skillsmarketplace
      BUILDER_AGENT_URL: http://builder-agent:8001
      NEXT_PUBLIC_SITE_NAME: Skills Marketplace
      NEXT_PUBLIC_GITHUB_URL: https://github.com/rrbanda/skill-mp
    depends_on:
      - builder-agent

volumes:
  neo4j_data:

# Run with: podman compose up -d
